<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waliya Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="side-scene" aria-label="Aquarium scene with Snoopy">
        <div class="water-light"></div>
        <div class="air-bubble air-bubble-one"></div>
        <div class="air-bubble air-bubble-two"></div>
        <div class="air-bubble air-bubble-three"></div>
        <div class="air-bubble air-bubble-four"></div>
        <div class="fish fish-one" aria-hidden="true"></div>
        <div class="fish fish-two" aria-hidden="true"></div>
        <div class="fish fish-three" aria-hidden="true"></div>
        <div class="reef" aria-hidden="true">
          <span class="plant plant-one"></span>
          <span class="plant plant-two"></span>
          <span class="plant plant-three"></span>
          <span class="coral coral-one"></span>
          <span class="coral coral-two"></span>
        </div>
        <div class="sand"></div>
        <div class="snoopy-perch">
          <figure class="snoopy-card" data-label="Snoopy">
            <img src="/assets/Snoopy_Peanuts.png" alt="Snoopy" onerror="this.closest('.snoopy-card').classList.add('missing')" />
            <figcaption>tank buddy</figcaption>
          </figure>
        </div>
      </section>

      <section class="chat-panel" aria-label="Chat with Waliya">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Waliya's little corner</p>
            <h1>hey Waliya</h1>
            <p class="subtitle">what's swimming around today?</p>
          </div>
          <div class="header-actions">
            <button class="mode-button" id="badDayToggle" type="button" aria-expanded="false" aria-controls="badDayPanel">bad day</button>
            <button class="icon-button" id="clearChat" type="button" title="Clear chat" aria-label="Clear chat">Clear</button>
          </div>
        </header>

        <section class="bad-day-panel" id="badDayPanel" aria-label="Bad day tools" hidden>
          <div class="bad-day-copy">
            <p>low tide mode</p>
            <span>pick one tiny next thing</span>
          </div>
          <div class="bad-day-actions">
            <button type="button" class="quick-button" data-prompt="just sit with me for a bit">sit with me</button>
            <button type="button" class="quick-button" data-prompt="distract me with something soft and easy">distract me</button>
            <button type="button" class="quick-button" data-prompt="say something soft to me">something soft</button>
            <a class="quick-link" id="textMaz" href="/api/text-maz">text Maz</a>
            <button type="button" class="quick-button safety-button" id="safetyButton">I might not be safe</button>
          </div>
        </section>

        <section class="care-reef" aria-label="Care bubbles">
          <div class="care-reef-copy">
            <p>tap a bubble</p>
            <span>small notes from the tank</span>
          </div>
          <div class="care-bubbles" id="careBubbles"></div>
          <p class="care-note" id="careNote" role="status" aria-live="polite"></p>
        </section>

        <section class="chat-body" aria-label="Chat messages">
          <div class="messages" id="messages" aria-live="polite"></div>
        </section>

        <form class="composer" id="chatForm">
          <div class="composer-row">
            <label class="visually-hidden" for="messageInput">Message</label>
            <textarea id="messageInput" rows="1" placeholder="Tell me what happened today..." autocomplete="off"></textarea>
            <button id="sendButton" type="submit">Send</button>
          </div>
          <div class="composer-buddies">
            <p class="dog-wisdom" id="dogWisdom">tap Fezco for dog wisdom</p>
            <button class="composer-buddy buddy-fezco" id="fezcoWisdom" type="button" aria-label="Get Fezco wisdom">
              <span class="tap-tag">tap me</span>
              <img src="/assets/fezco.png" alt="" />
              <span class="buddy-caption">Fezco watch</span>
            </button>
            <button class="composer-buddy buddy-nap" id="napWisdom" type="button" aria-label="Get nap support wisdom">
              <span class="tap-tag">tap me</span>
              <img src="/assets/dog-buddy.png" alt="" />
              <span class="buddy-caption">nap support</span>
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
