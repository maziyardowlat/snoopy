<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waliya Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="side-scene" aria-label="Snoopy and Moomin scene">
        <div class="scene-sky"></div>
        <div class="scene-sun"></div>
        <div class="scene-ground"></div>
        <div class="character-stack">
          <figure class="character-card snoopy-card" data-label="Snoopy">
            <img src="/assets/Snoopy_Peanuts.png" alt="Snoopy" onerror="this.closest('.character-card').classList.add('missing')" />
            <figcaption>Snoopy</figcaption>
          </figure>
          <figure class="character-card moomin-card" data-label="Moomin">
            <img src="/assets/764378_poster.jpg" alt="Moomin" onerror="this.closest('.character-card').classList.add('missing')" />
            <figcaption>Moomin</figcaption>
          </figure>
        </div>
      </section>

      <section class="chat-panel" aria-label="Chat with Waliya">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Waliya's little corner</p>
            <h1>hey Waliya</h1>
            <p class="subtitle">how was your day?</p>
          </div>
          <button class="icon-button" id="clearChat" type="button" title="Clear chat" aria-label="Clear chat">Clear</button>
        </header>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <label class="visually-hidden" for="messageInput">Message</label>
          <textarea id="messageInput" rows="1" placeholder="Tell me what happened today..." autocomplete="off"></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="/script.js" defer></script>
  </body>
</html>
